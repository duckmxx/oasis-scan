<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan Oasis — Login</title>
  <link rel="icon" type="image/png" href="/static/img/favicon.png" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .auth-logo .logo-icon { width: 40px; height: 40px; object-fit: contain; }
    .auth-logo .logo-text { font-size: 20px; font-weight: 700; }
    .auth-logo .logo-text span { color: var(--accent); }
    .auth-tabs { display: flex; gap: 4px; margin-bottom: 28px; background: var(--bg-card); border-radius: var(--radius-md); padding: 4px; }
    .auth-tab {
      flex: 1; padding: 8px; text-align: center; border-radius: 6px;
      cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-secondary);
      border: none; background: none; transition: var(--transition);
    }
    .auth-tab.active { background: var(--bg-hover); color: var(--text-primary); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 10px 14px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--radius-md);
      color: var(--text-primary); font-size: 14px; font-family: var(--font-sans);
      outline: none; transition: var(--transition);
    }
    .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
    .btn-full { width: 100%; padding: 11px; font-size: 14px; font-weight: 600; margin-top: 8px; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-muted); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .btn-google {
      width: 100%; padding: 10px; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-md); color: var(--text-primary); font-size: 14px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: var(--transition); font-family: var(--font-sans);
    }
    .btn-google:hover { background: var(--bg-hover); border-color: var(--border-accent); }
    .auth-error { color: var(--sev-critical); font-size: 12px; margin-top: 12px; min-height: 18px; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <img class="logo-icon" src="/static/img/logo.png" alt="Scan Oasis" />
      <div class="logo-text"><span>Scan</span> Oasis</div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Sign In</button>
      <button class="auth-tab" id="tab-signup">Create Account</button>
    </div>

    <div id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary btn-full" id="login-btn">Sign In</button>
    </div>

    <div id="form-signup" style="display:none">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="min 6 characters" />
      </div>
      <button class="btn btn-primary btn-full" id="signup-btn">Create Account</button>
    </div>

    <div class="divider">or</div>
    <button class="btn-google" id="google-btn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>

    <div class="auth-error" id="auth-error"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";

    const firebaseConfig = {{ firebase_json | safe }};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, user => {
      if (user) window.location.href = '/';
    });

    const errorEl = document.getElementById('auth-error');
    function showError(msg) { errorEl.textContent = msg; }

    // Tabs
    document.getElementById('tab-login').addEventListener('click', () => {
      document.getElementById('form-login').style.display = '';
      document.getElementById('form-signup').style.display = 'none';
      document.getElementById('tab-login').classList.add('active');
      document.getElementById('tab-signup').classList.remove('active');
      showError('');
    });
    document.getElementById('tab-signup').addEventListener('click', () => {
      document.getElementById('form-signup').style.display = '';
      document.getElementById('form-login').style.display = 'none';
      document.getElementById('tab-signup').classList.add('active');
      document.getElementById('tab-login').classList.remove('active');
      showError('');
    });

    // Email/password login
    document.getElementById('login-btn').addEventListener('click', async () => {
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-password').value;
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (e) {
        showError(friendlyError(e.code));
      }
    });

    // Email/password signup
    document.getElementById('signup-btn').addEventListener('click', async () => {
      const email = document.getElementById('signup-email').value.trim();
      const pass  = document.getElementById('signup-password').value;
      try {
        await createUserWithEmailAndPassword(auth, email, pass);
      } catch (e) {
        showError(friendlyError(e.code));
      }
    });

    // Google
    document.getElementById('google-btn').addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, new GoogleAuthProvider());
      } catch (e) {
        showError(friendlyError(e.code));
      }
    });

    function friendlyError(code) {
      const map = {
        'auth/user-not-found': 'No account found with that email.',
        'auth/wrong-password': 'Incorrect password.',
        'auth/email-already-in-use': 'An account with this email already exists.',
        'auth/weak-password': 'Password must be at least 6 characters.',
        'auth/invalid-email': 'Invalid email address.',
        'auth/popup-closed-by-user': 'Google sign-in was cancelled.',
      };
      return map[code] || 'Something went wrong. Please try again.';
    }
  </script>
</body>
</html>
